<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Audit technologique : les 3 erreurs qui coûtent le plus cher">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141840"/>
      <stop offset="100%" stop-color="#0f1235"/>
    </linearGradient>
    <pattern id="grid5" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <radialGradient id="lensGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F8BE1C" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F8BE1C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg5)"/>
  <rect width="1200" height="630" fill="url(#grid5)"/>

  <!-- Layered architecture stack (right side) -->
  <g transform="translate(640 130)">
    <!-- Layer 1 — top (UI) -->
    <g>
      <rect x="0" y="0" width="440" height="55" rx="6" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"/>
      <text x="20" y="34" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ffffff" fill-opacity="0.85" letter-spacing="2">FRONTEND · UI</text>
      <circle cx="420" cy="27" r="4" fill="#22C55E"/>
    </g>
    <!-- Layer 2 — API -->
    <g transform="translate(0 70)">
      <rect x="0" y="0" width="440" height="55" rx="6" fill="#2AB0C1" fill-opacity="0.12" stroke="#2AB0C1" stroke-opacity="0.5" stroke-width="1"/>
      <text x="20" y="34" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2AB0C1" letter-spacing="2">API · MIDDLEWARE</text>
      <circle cx="420" cy="27" r="4" fill="#22C55E"/>
    </g>
    <!-- Layer 3 — Business logic with CRACK (erreur 1) -->
    <g transform="translate(0 140)">
      <rect x="0" y="0" width="440" height="55" rx="6" fill="#ffffff" fill-opacity="0.08" stroke="#F8BE1C" stroke-opacity="0.75" stroke-width="1.5" stroke-dasharray="0"/>
      <text x="20" y="34" font-family="'JetBrains Mono', monospace" font-size="11" fill="#F8BE1C" letter-spacing="2">LOGIQUE MÉTIER</text>
      <!-- Fissure jagged line across the layer -->
      <path d="M 180 5 L 195 15 L 188 25 L 205 35 L 198 50"
            fill="none" stroke="#F8BE1C" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Warning triangle -->
      <g transform="translate(410 18)">
        <path d="M 10 0 L 20 18 L 0 18 Z" fill="#F8BE1C"/>
        <text x="10" y="15" text-anchor="middle" font-family="'Archivo', sans-serif" font-size="12" font-weight="700" fill="#141840">!</text>
      </g>
    </g>
    <!-- Layer 4 — Data with bigger crack (erreur 2) -->
    <g transform="translate(0 210)">
      <rect x="0" y="0" width="440" height="55" rx="6" fill="#ffffff" fill-opacity="0.05" stroke="#F8BE1C" stroke-opacity="0.75" stroke-width="1.5"/>
      <text x="20" y="34" font-family="'JetBrains Mono', monospace" font-size="11" fill="#F8BE1C" letter-spacing="2">DONNÉES · DB</text>
      <!-- Fissure -->
      <path d="M 270 5 L 285 20 L 275 32 L 292 45 L 282 55"
            fill="none" stroke="#F8BE1C" stroke-width="1.5" stroke-linecap="round"/>
      <g transform="translate(410 18)">
        <path d="M 10 0 L 20 18 L 0 18 Z" fill="#F8BE1C"/>
        <text x="10" y="15" text-anchor="middle" font-family="'Archivo', sans-serif" font-size="12" font-weight="700" fill="#141840">!</text>
      </g>
    </g>
    <!-- Layer 5 — Infra with biggest issue (erreur 3) -->
    <g transform="translate(0 280)">
      <rect x="0" y="0" width="440" height="55" rx="6" fill="#ffffff" fill-opacity="0.05" stroke="#F8BE1C" stroke-opacity="0.75" stroke-width="1.5"/>
      <text x="20" y="34" font-family="'JetBrains Mono', monospace" font-size="11" fill="#F8BE1C" letter-spacing="2">INFRASTRUCTURE · CLOUD</text>
      <path d="M 320 3 L 335 20 L 325 35 L 340 52"
            fill="none" stroke="#F8BE1C" stroke-width="1.8" stroke-linecap="round"/>
      <g transform="translate(410 18)">
        <path d="M 10 0 L 20 18 L 0 18 Z" fill="#F8BE1C"/>
        <text x="10" y="15" text-anchor="middle" font-family="'Archivo', sans-serif" font-size="12" font-weight="700" fill="#141840">!</text>
      </g>
    </g>
  </g>

  <!-- Magnifying glass (loupe) zooming on the defects -->
  <g transform="translate(540 340)">
    <!-- Glow behind lens -->
    <circle cx="0" cy="0" r="130" fill="url(#lensGlow)"/>

    <!-- Lens ring -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#F8BE1C" stroke-width="4"/>
    <circle cx="0" cy="0" r="100" fill="#141840" fill-opacity="0.3"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>

    <!-- Highlight reflection inside lens -->
    <path d="M -70 -60 Q -30 -90, 10 -80" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2" stroke-linecap="round"/>

    <!-- Handle -->
    <line x1="78" y1="78" x2="175" y2="175" stroke="#F8BE1C" stroke-width="14" stroke-linecap="round"/>
    <line x1="78" y1="78" x2="175" y2="175" stroke="#141840" stroke-width="5" stroke-linecap="round" stroke-dasharray="0"/>

    <!-- Inside the lens: enlarged warning X mark with $ -->
    <g opacity="0.92">
      <text x="0" y="-10" text-anchor="middle" font-family="'Archivo', sans-serif" font-size="54" font-weight="700" fill="#F8BE1C">03</text>
      <text x="0" y="30" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ffffff" fill-opacity="0.85" letter-spacing="3">ERREURS</text>
      <text x="0" y="56" text-anchor="middle" font-family="'Instrument Serif', serif" font-style="italic" font-size="16" fill="#F8BE1C">coûteuses</text>
    </g>
  </g>

  <!-- Eyebrow -->
  <g transform="translate(80 80)">
    <rect width="8" height="8" fill="#F8BE1C"/>
    <text x="22" y="8" font-family="'JetBrains Mono', monospace" font-size="11" fill="#F8BE1C" letter-spacing="3">AUDIT TECHNOLOGIQUE</text>
  </g>

  <!-- Title -->
  <text x="80" y="155" font-family="'Archivo', sans-serif" font-size="40" font-weight="700" fill="#ffffff" letter-spacing="-1">Trois failles</text>
  <text x="80" y="200" font-family="'Archivo', sans-serif" font-size="40" font-weight="700" fill="#ffffff" letter-spacing="-1">qui coûtent</text>
  <text x="80" y="255" font-family="'Instrument Serif', serif" font-style="italic" font-size="40" font-weight="400" fill="#F8BE1C" letter-spacing="-1">des millions.</text>

  <text x="80" y="305" font-family="'Archivo', sans-serif" font-size="15" font-weight="300" fill="#ffffff" fill-opacity="0.55" letter-spacing="0">Les repérer à temps. Les corriger avant qu'elles ne se propagent.</text>

  <text x="1120" y="590" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#ffffff" fill-opacity="0.35" letter-spacing="2">digitowls · tech audit</text>
</svg>
