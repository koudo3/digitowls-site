<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Maturité d'adoption de l'IA en entreprise">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1235"/>
      <stop offset="100%" stop-color="#141840"/>
    </linearGradient>
    <linearGradient id="curve1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2AB0C1"/>
      <stop offset="100%" stop-color="#F8BE1C"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.75" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#F8BE1C" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F8BE1C" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid1" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <rect width="1200" height="630" fill="url(#grid1)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>

  <!-- Axes -->
  <line x1="120" y1="530" x2="1080" y2="530" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>
  <line x1="120" y1="530" x2="120" y2="140" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="600" y="590" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ffffff" fill-opacity="0.5" letter-spacing="3">TEMPS · ADOPTION IA</text>
  <text x="80" y="335" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ffffff" fill-opacity="0.5" letter-spacing="3" transform="rotate(-90 80 335)">MATURITÉ</text>

  <!-- Dashed level lines -->
  <line x1="120" y1="460" x2="1080" y2="460" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="120" y1="370" x2="1080" y2="370" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="120" y1="280" x2="1080" y2="280" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="120" y1="190" x2="1080" y2="190" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- Curve (ease-up staircase smoothed) -->
  <path d="M 120 500 Q 260 500, 300 460 T 480 370 T 700 280 T 920 190 L 1080 180"
        fill="none" stroke="url(#curve1)" stroke-width="4" stroke-linecap="round"/>

  <!-- Subtle curve glow -->
  <path d="M 120 500 Q 260 500, 300 460 T 480 370 T 700 280 T 920 190 L 1080 180"
        fill="none" stroke="#F8BE1C" stroke-width="10" stroke-linecap="round" stroke-opacity="0.12"/>

  <!-- 4 stage nodes -->
  <g>
    <!-- Stage 1 -->
    <circle cx="260" cy="495" r="9" fill="#2AB0C1"/>
    <circle cx="260" cy="495" r="16" fill="none" stroke="#2AB0C1" stroke-opacity="0.35" stroke-width="1"/>
    <text x="260" y="540" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ffffff" fill-opacity="0.85" letter-spacing="1.5">01 · AWARE</text>

    <!-- Stage 2 -->
    <circle cx="480" cy="370" r="9" fill="#2AB0C1"/>
    <circle cx="480" cy="370" r="16" fill="none" stroke="#2AB0C1" stroke-opacity="0.35" stroke-width="1"/>
    <text x="480" y="345" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ffffff" letter-spacing="1.5">02 · ACTIVE</text>

    <!-- Stage 3 -->
    <circle cx="700" cy="280" r="10" fill="#F8BE1C"/>
    <circle cx="700" cy="280" r="18" fill="none" stroke="#F8BE1C" stroke-opacity="0.4" stroke-width="1"/>
    <text x="700" y="255" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ffffff" letter-spacing="1.5">03 · OPERATIONAL</text>

    <!-- Stage 4 -->
    <circle cx="920" cy="190" r="11" fill="#F8BE1C"/>
    <circle cx="920" cy="190" r="22" fill="none" stroke="#F8BE1C" stroke-opacity="0.5" stroke-width="1.5"/>
    <circle cx="920" cy="190" r="32" fill="none" stroke="#F8BE1C" stroke-opacity="0.2" stroke-width="1"/>
    <text x="920" y="165" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#F8BE1C" letter-spacing="1.5">04 · TRANSFORMATIONAL</text>
  </g>

  <!-- Eyebrow label -->
  <g transform="translate(80 80)">
    <rect width="8" height="8" fill="#F8BE1C"/>
    <text x="22" y="8" font-family="'JetBrains Mono', monospace" font-size="11" fill="#F8BE1C" letter-spacing="3">IA · MATURITÉ</text>
  </g>

  <!-- Title -->
  <text x="80" y="130" font-family="'Archivo', sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="-1">Du premier test</text>
  <text x="80" y="170" font-family="'Instrument Serif', serif" font-style="italic" font-size="36" font-weight="400" fill="#F8BE1C" letter-spacing="-1">à la transformation.</text>

  <!-- Brand mark bottom right -->
  <text x="1120" y="590" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#ffffff" fill-opacity="0.35" letter-spacing="2">digitowls · gartner model</text>
</svg>
