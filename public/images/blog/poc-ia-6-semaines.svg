<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="POC IA en 6 semaines">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141840"/>
      <stop offset="100%" stop-color="#1a1f55"/>
    </linearGradient>
    <linearGradient id="progress3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2AB0C1"/>
      <stop offset="60%" stop-color="#2AB0C1"/>
      <stop offset="100%" stop-color="#F8BE1C"/>
    </linearGradient>
    <pattern id="grid3" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg3)"/>
  <rect width="1200" height="630" fill="url(#grid3)"/>

  <!-- Eyebrow -->
  <g transform="translate(80 80)">
    <rect width="8" height="8" fill="#F8BE1C"/>
    <text x="22" y="8" font-family="'JetBrains Mono', monospace" font-size="11" fill="#F8BE1C" letter-spacing="3">POC IA · SPRINT</text>
  </g>

  <!-- Title -->
  <text x="80" y="150" font-family="'Archivo', sans-serif" font-size="54" font-weight="700" fill="#ffffff" letter-spacing="-2">6 semaines.</text>
  <text x="80" y="210" font-family="'Instrument Serif', serif" font-style="italic" font-size="42" font-weight="400" fill="#2AB0C1" letter-spacing="-1">Un cas d'usage validé.</text>

  <!-- Subtitle -->
  <text x="80" y="255" font-family="'Archivo', sans-serif" font-size="16" font-weight="300" fill="#ffffff" fill-opacity="0.6" letter-spacing="0">De l'idée au prototype fonctionnel, sans détour.</text>

  <!-- Timeline -->
  <g transform="translate(80 380)">
    <!-- Background track -->
    <rect x="0" y="25" width="1040" height="14" rx="7" fill="#ffffff" fill-opacity="0.08"/>
    <!-- Progress fill -->
    <rect x="0" y="25" width="1040" height="14" rx="7" fill="url(#progress3)"/>
    <!-- Subtle glow along the progress -->
    <rect x="0" y="25" width="1040" height="14" rx="7" fill="url(#progress3)" opacity="0.4" filter="blur(2px)"/>

    <!-- Week markers -->
    <g font-family="'JetBrains Mono', monospace" font-size="11" fill="#ffffff" letter-spacing="1.5">
      <!-- S1 -->
      <circle cx="0" cy="32" r="10" fill="#2AB0C1" stroke="#141840" stroke-width="3"/>
      <text x="0" y="80" text-anchor="middle" fill-opacity="0.85">S1</text>
      <text x="0" y="100" text-anchor="middle" font-size="10" fill-opacity="0.5">CADRAGE</text>

      <!-- S2 -->
      <circle cx="208" cy="32" r="10" fill="#2AB0C1" stroke="#141840" stroke-width="3"/>
      <text x="208" y="80" text-anchor="middle" fill-opacity="0.85">S2</text>
      <text x="208" y="100" text-anchor="middle" font-size="10" fill-opacity="0.5">DATA</text>

      <!-- S3 -->
      <circle cx="416" cy="32" r="10" fill="#2AB0C1" stroke="#141840" stroke-width="3"/>
      <text x="416" y="80" text-anchor="middle" fill-opacity="0.85">S3</text>
      <text x="416" y="100" text-anchor="middle" font-size="10" fill-opacity="0.5">MODÈLE</text>

      <!-- S4 -->
      <circle cx="624" cy="32" r="10" fill="#2AB0C1" stroke="#141840" stroke-width="3"/>
      <text x="624" y="80" text-anchor="middle" fill-opacity="0.85">S4</text>
      <text x="624" y="100" text-anchor="middle" font-size="10" fill-opacity="0.5">ITÉRATIONS</text>

      <!-- S5 -->
      <circle cx="832" cy="32" r="10" fill="#F8BE1C" stroke="#141840" stroke-width="3"/>
      <text x="832" y="80" text-anchor="middle" fill-opacity="0.85">S5</text>
      <text x="832" y="100" text-anchor="middle" font-size="10" fill-opacity="0.5">INTERFACE</text>

      <!-- S6 — milestone, larger -->
      <circle cx="1040" cy="32" r="16" fill="#F8BE1C" stroke="#141840" stroke-width="3"/>
      <circle cx="1040" cy="32" r="26" fill="none" stroke="#F8BE1C" stroke-opacity="0.5" stroke-width="1.5"/>
      <circle cx="1040" cy="32" r="40" fill="none" stroke="#F8BE1C" stroke-opacity="0.2" stroke-width="1"/>
      <text x="1040" y="37" text-anchor="middle" font-family="'Archivo', sans-serif" font-size="13" font-weight="700" fill="#141840">✓</text>
      <text x="1040" y="90" text-anchor="middle" font-size="12" fill="#F8BE1C" fill-opacity="1" font-weight="600">S6</text>
      <text x="1040" y="110" text-anchor="middle" font-size="10" fill="#F8BE1C" fill-opacity="0.8">DÉMO LIVE</text>
    </g>
  </g>

  <!-- 3 stat pills at the bottom -->
  <g transform="translate(80 540)" font-family="'JetBrains Mono', monospace">
    <g>
      <text x="0" y="0" font-family="'Archivo', sans-serif" font-size="24" font-weight="700" fill="#ffffff">4–6</text>
      <text x="0" y="22" font-size="10" fill="#ffffff" fill-opacity="0.5" letter-spacing="2">SEMAINES</text>
    </g>
    <g transform="translate(160 0)">
      <text x="0" y="0" font-family="'Archivo', sans-serif" font-size="24" font-weight="700" fill="#2AB0C1">1</text>
      <text x="0" y="22" font-size="10" fill="#ffffff" fill-opacity="0.5" letter-spacing="2">PROTOTYPE VALIDÉ</text>
    </g>
    <g transform="translate(360 0)">
      <text x="0" y="0" font-family="'Archivo', sans-serif" font-size="24" font-weight="700" fill="#F8BE1C">0</text>
      <text x="0" y="22" font-size="10" fill="#ffffff" fill-opacity="0.5" letter-spacing="2">RISQUE D'ENLISEMENT</text>
    </g>
  </g>

  <text x="1120" y="590" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#ffffff" fill-opacity="0.35" letter-spacing="2">digitowls · poc sprint</text>
</svg>
