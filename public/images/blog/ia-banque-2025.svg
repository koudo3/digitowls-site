<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="L'IA transforme le secteur bancaire en 2025">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141840"/>
      <stop offset="100%" stop-color="#0b0d28"/>
    </linearGradient>
    <linearGradient id="colGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2AB0C1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2AB0C1" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="glow2" cx="0.3" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#2AB0C1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2AB0C1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle radial grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" fill="none" stroke-width="1">
    <circle cx="350" cy="315" r="160"/>
    <circle cx="350" cy="315" r="240"/>
    <circle cx="350" cy="315" r="320"/>
  </g>

  <!-- Parthenon-like bank facade (abstract) on the right -->
  <g transform="translate(700 140)">
    <!-- Pediment triangle -->
    <path d="M 50 0 L 220 0 L 135 -55 Z" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>
    <!-- Top entablature line -->
    <line x1="30" y1="20" x2="240" y2="20" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>
    <line x1="30" y1="30" x2="240" y2="30" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
    <!-- 5 columns -->
    <g>
      <rect x="40" y="40" width="22" height="230" fill="url(#colGrad)"/>
      <rect x="85" y="40" width="22" height="230" fill="url(#colGrad)"/>
      <rect x="130" y="40" width="22" height="230" fill="url(#colGrad)"/>
      <rect x="175" y="40" width="22" height="230" fill="url(#colGrad)"/>
      <rect x="220" y="40" width="22" height="230" fill="url(#colGrad)" opacity="0.6"/>
    </g>
    <!-- Steps -->
    <line x1="25" y1="275" x2="250" y2="275" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>
    <line x1="15" y1="288" x2="260" y2="288" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1"/>
    <line x1="5" y1="302" x2="270" y2="302" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>

    <!-- Dollar mark / $ symbol dans le fronton -->
    <text x="135" y="-18" text-anchor="middle" font-family="serif" font-size="28" fill="#F8BE1C" font-weight="400">$</text>
  </g>

  <!-- Neural network overlay on the left (data nodes) -->
  <g transform="translate(100 180)">
    <!-- Connections layer 1→2 -->
    <g stroke="#F8BE1C" stroke-opacity="0.35" stroke-width="1">
      <line x1="20" y1="30" x2="130" y2="30"/>
      <line x1="20" y1="30" x2="130" y2="90"/>
      <line x1="20" y1="30" x2="130" y2="150"/>
      <line x1="20" y1="110" x2="130" y2="30"/>
      <line x1="20" y1="110" x2="130" y2="90"/>
      <line x1="20" y1="110" x2="130" y2="150"/>
      <line x1="20" y1="110" x2="130" y2="210"/>
      <line x1="20" y1="190" x2="130" y2="90"/>
      <line x1="20" y1="190" x2="130" y2="150"/>
      <line x1="20" y1="190" x2="130" y2="210"/>
    </g>
    <!-- Connections layer 2→3 (highlighted teal) -->
    <g stroke="#2AB0C1" stroke-opacity="0.6" stroke-width="1.2">
      <line x1="130" y1="30" x2="240" y2="70"/>
      <line x1="130" y1="90" x2="240" y2="70"/>
      <line x1="130" y1="90" x2="240" y2="170"/>
      <line x1="130" y1="150" x2="240" y2="70"/>
      <line x1="130" y1="150" x2="240" y2="170"/>
      <line x1="130" y1="210" x2="240" y2="170"/>
    </g>

    <!-- Nodes layer 1 -->
    <g>
      <circle cx="20" cy="30" r="6" fill="#F8BE1C"/>
      <circle cx="20" cy="110" r="6" fill="#F8BE1C"/>
      <circle cx="20" cy="190" r="6" fill="#F8BE1C"/>
    </g>
    <!-- Nodes layer 2 -->
    <g>
      <circle cx="130" cy="30" r="6" fill="#ffffff" fill-opacity="0.85"/>
      <circle cx="130" cy="90" r="7" fill="#2AB0C1"/>
      <circle cx="130" cy="150" r="7" fill="#2AB0C1"/>
      <circle cx="130" cy="210" r="6" fill="#ffffff" fill-opacity="0.85"/>
    </g>
    <!-- Nodes layer 3 (outputs) -->
    <g>
      <circle cx="240" cy="70" r="8" fill="#F8BE1C"/>
      <circle cx="240" cy="70" r="14" fill="none" stroke="#F8BE1C" stroke-opacity="0.35" stroke-width="1"/>
      <circle cx="240" cy="170" r="8" fill="#F8BE1C"/>
      <circle cx="240" cy="170" r="14" fill="none" stroke="#F8BE1C" stroke-opacity="0.35" stroke-width="1"/>
    </g>

    <!-- Micro labels -->
    <text x="20" y="275" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#ffffff" fill-opacity="0.5" letter-spacing="1.5">TRANSACTIONS</text>
    <text x="130" y="275" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#ffffff" fill-opacity="0.5" letter-spacing="1.5">ANALYSE IA</text>
    <text x="240" y="275" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#F8BE1C" fill-opacity="0.85" letter-spacing="1.5">DÉCISION</text>
  </g>

  <!-- Eyebrow label -->
  <g transform="translate(80 80)">
    <rect width="8" height="8" fill="#F8BE1C"/>
    <text x="22" y="8" font-family="'JetBrains Mono', monospace" font-size="11" fill="#F8BE1C" letter-spacing="3">FINTECH · IA · 2025</text>
  </g>

  <!-- Title -->
  <text x="80" y="490" font-family="'Archivo', sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="-1">La banque,</text>
  <text x="80" y="535" font-family="'Instrument Serif', serif" font-style="italic" font-size="36" font-weight="400" fill="#2AB0C1" letter-spacing="-1">réinventée par l'intelligence.</text>

  <!-- Brand -->
  <text x="1120" y="590" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#ffffff" fill-opacity="0.35" letter-spacing="2">digitowls · banking ai</text>
</svg>
